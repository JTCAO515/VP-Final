name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

  # Reserved: evals gate. Becomes required once packages/ai ships its first
  # prompt profile (V2 Issue #9) — any PR touching prompts/models must pass.
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm evals

  database-contracts:
    name: Database contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: supabase/setup-cli@v2
        with:
          version: 2.109.1
          github-token: ${{ github.token }}
      - run: supabase start --workdir infra
      - run: supabase db reset --local --no-seed --workdir infra
      - run: bash infra/scripts/run-pgtap-contracts.sh
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @visepanda/ai build
      - run: pnpm --filter @visepanda/domain build
      - run: pnpm --filter @visepanda/app-server build
      - run: pnpm --filter @visepanda/app-server exec vitest run src/db/versionedTripService.integration.test.ts src/db/opsAuthorizationService.integration.test.ts src/db/agentTraceService.integration.test.ts src/db/knowledgeService.integration.test.ts
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      - run: pnpm --filter @visepanda/app-web exec vitest run src/app/api/serverComposition.integration.test.ts
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      - run: pnpm --filter @visepanda/app-ops exec vitest run src/app/api/knowledge/store.integration.test.ts
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
      - run: supabase db advisors --local --type security --level warn --fail-on error --workdir infra
