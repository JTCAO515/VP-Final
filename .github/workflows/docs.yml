name: Documentation Governance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:index
      - run: pnpm docs:check
      - name: Verify source-to-document synchronization (pull request)
        if: github.event_name == 'pull_request'
        run: pnpm docs:impact -- --base "${{ github.event.pull_request.base.sha }}"
      - name: Verify source-to-document synchronization (push)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: pnpm docs:impact -- --base "${{ github.event.before }}"
